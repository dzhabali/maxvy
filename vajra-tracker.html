<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"/>
<title>Ваджра-трекер</title>
<!-- PWA / оффлайн -->
<link rel="manifest" href="manifest.webmanifest"/>
<meta name="theme-color" content="#0d4a3a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Ваджра"/>
<link rel="apple-touch-icon" href="icon-180.png"/>
<style>
  :root{
    --crimson:#c0185a;--crimson2:#96124a;--crimson-light:#fce7f3;
    --green:#22c55e;--green-dark:#166534;--green-bg:#dcfce7;--green-border:#bbf7d0;
    --blue-bg:#dbeafe;--blue-border:#bfdbfe;--blue-text:#1e40af;
    --amber-bg:#fef9c3;--amber-border:#fde68a;--amber-text:#92400e;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:#f8f9fa;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:16px;line-height:1.35;color:#111;max-width:480px;margin:0 auto;min-height:100vh}

  /* TOPBAR */
  .topbar{position:sticky;top:0;z-index:20;background:#fff;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #e5e7eb}
  .app-title{font-weight:700;font-size:15px}
  .app-ver{font-size:11px;color:#9ca3af;font-weight:600;margin-left:6px}
  .date-badge{font-size:12px;color:#6b7280;background:#f3f4f6;padding:4px 10px;border-radius:999px;border:1px solid #e5e7eb}
  .offline-badge{font-size:11px;font-weight:600;color:#92400e;background:#fef9c3;padding:4px 9px;border-radius:999px;border:1px solid #fde68a;margin-left:auto}
  .undo-btn{border:1px solid #e5e7eb;background:#fff;color:#6b7280;padding:4px 10px;border-radius:999px;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:3px;margin-left:auto;margin-right:8px}
  .undo-btn:hover{background:#f3f4f6;color:#111}
  .undo-btn:active{transform:scale(.95)}

  /* AUTH */
  .auth-bar{background:#f9fafb;border-bottom:1px solid #e5e7eb;padding:10px 16px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
  .auth-bar input{padding:7px 10px;border:1px solid #e5e7eb;border-radius:8px;font-size:13px;background:#fff;width:150px}
  .auth-bar button{padding:7px 12px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500}
  .btn-signin{background:#111;color:#fff}
  .btn-signup{background:#f3f4f6;color:#111;border:1px solid #e5e7eb}
  .btn-reset{background:transparent;color:#6b7280;font-size:12px;padding:4px 6px}
  .btn-logout{background:#fee2e2;color:#991b1b}
  .auth-status{font-size:12px;color:#6b7280;padding:4px 8px;background:#f3f4f6;border-radius:999px}

  /* SLEEP BAR */
  .sleep-bar{padding:8px 16px;border-bottom:1px solid #e5e7eb;background:#f9fafb}
  .sleep-til-btn{width:100%;padding:9px;border-radius:10px;border:1px solid #e5e7eb;background:#fff;cursor:pointer;font-size:13px;color:#6b7280;text-align:center;transition:all .15s}
  .sleep-til-btn:hover{background:#f3f4f6;color:#111}
  .sleep-til-btn.done{color:var(--blue-text);border-color:var(--blue-border);background:var(--blue-bg)}

  /* HISTORY */
  .hist-section{padding:0 16px;overflow:hidden;display:none}
  .hist-section.open{display:block}
  .hist-rows{max-height:300px;overflow-y:auto;border-radius:12px;border:1px solid #e5e7eb}
  .hist-section.all-open .hist-rows{max-height:none;overflow-y:visible}
  .hist-hint{text-align:center;font-size:12px;color:#9ca3af;padding:10px 0 6px}
  
  .hist-row{display:flex;align-items:center;gap:8px;padding:9px 12px;border-bottom:1px solid #f3f4f6;background:#fff}
  .hist-row:last-child{border-bottom:none}
  .hist-time{font-size:13px;color:#6b7280;width:44px;flex-shrink:0}
  .hist-cnt{font-size:14px;font-weight:600;color:#111;min-width:18px}
  .hist-acts{display:flex;gap:4px;margin-left:auto;align-items:center;flex-wrap:wrap}

  /* SLOT CARDS */
  .slots-wrap{padding:10px 16px 6px;display:flex;flex-direction:column;gap:6px}
  .nb{border-radius:12px;border:1px solid #e5e7eb;padding:10px 14px;display:flex;align-items:center;gap:10px;background:#f9fafb}
  .nb-time{font-size:13px;color:#6b7280;width:44px;flex-shrink:0}
  .nb-cnt{font-size:15px;font-weight:600;color:#6b7280;min-width:20px;text-align:right;flex:1}
  .nb-btns{display:flex;gap:4px;align-items:center;flex-wrap:wrap}

  /* BUTTONS */
  .btn-base{padding:5px 8px;border-radius:8px;border:1px solid #e5e7eb;background:transparent;cursor:pointer;font-size:12px;color:#6b7280;transition:background .12s}
  .btn-base:hover{background:#f3f4f6}
  .btn-base.on{background:var(--green-bg);color:var(--green-dark);border-color:var(--green-border)}
  .btn-base.on-blue{background:var(--blue-bg);color:var(--blue-text);border-color:var(--blue-border)}
  .btn-base.on-amber{background:var(--amber-bg);color:var(--amber-text);border-color:var(--amber-border)}

  .gem-btn{display:flex;align-items:center;gap:3px;padding:5px 9px;border-radius:8px;border:1px solid #fda4cf;background:#fff0f6;cursor:pointer;font-size:13px;color:#9b1040;transition:background .12s;line-height:1}
  .gem-btn:hover{background:#fce7f3}
  .gem-btn.minus{border-color:#e5e7eb;background:transparent;color:#6b7280}
  .gem-btn.minus:hover{background:#fff0f6;border-color:#fda4cf;color:#9b1040}
  .gem-icon{width:13px;height:13px;flex-shrink:0}

  /* MAIN BUTTON */
  .main-btn-wrap{padding:0 16px;margin-bottom:10px}
  .main-btn{width:100%;border:none;border-radius:24px;background:#0d4a3a;cursor:pointer;padding:0;display:flex;flex-direction:column;align-items:center;gap:5px;transition:transform .08s,background .15s;user-select:none}
  .main-btn:active{transform:scale(.985);background:var(--crimson2)}
  .cur-time-badge{font-size:13px;color:rgba(255,255,255,.6);margin-bottom:2px}
  .main-cnt{font-size:42px;font-weight:700;color:#fff;line-height:1}
  .main-sub{font-size:14px;color:rgba(255,255,255,.75)}

  /* BOT BUTTONS */
  .bot-btns{display:flex;gap:8px;padding:0 16px}
  .bot-btn{flex:1;padding:12px;border-radius:10px;border:1px solid #e5e7eb;background:#fff;cursor:pointer;font-size:13px;color:#6b7280;transition:all .12s}
  .bot-btn:hover{background:#f9fafb}
  .bot-btn.on{color:var(--green-dark);border-color:var(--green-border);background:var(--green-bg)}
  .bot-btn.on-amber{color:var(--amber-text);border-color:var(--amber-border);background:var(--amber-bg)}

  /* FOOTER PROGRESS */
  .footer-bar{position:sticky;bottom:0;margin-top:14px;padding:10px 16px;border-top:1px solid #e5e7eb;display:flex;align-items:center;gap:12px;background:#fff;z-index:10}
  .ft{flex:1;height:10px;background:#f3f4f6;border-radius:6px;overflow:hidden;border:1px solid #e5e7eb}
  .ft-fill{height:100%;border-radius:6px;background:var(--green);transition:width .4s cubic-bezier(.34,1.56,.64,1)}
  .ft-label{font-size:13px;font-weight:600;color:#111;white-space:nowrap}
  .ft-pct{font-size:12px;color:#6b7280;white-space:nowrap}

  /* LANDSCAPE QUICK-TAP — телефон горизонтально: таймер + счётчик, весь экран = +1 */
  #landscapeMode{display:none}
  @media (orientation:landscape) and (max-height:560px){
    #landscapeMode{
      display:flex;position:fixed;inset:0;z-index:90;background:#0d4a3a;border:none;margin:0;
      flex-direction:row;align-items:center;justify-content:space-around;gap:4vw;
      color:#fff;cursor:pointer;
      user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;
      touch-action:manipulation;transition:background .5s;
      padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
  }
  #landscapeMode:active{background:#0a3d30}
  .ls-timer-wrap{position:relative;width:min(42vh,300px);height:min(42vh,300px);flex-shrink:0}
  .ls-timer-svg{width:100%;height:100%;transform:rotate(-90deg)}
  .ls-timer-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
  .ls-timer-disp{font-size:clamp(34px,7vh,52px);font-weight:700;color:#fff;line-height:1;font-variant-numeric:tabular-nums}
  .ls-timer-slot{font-size:clamp(13px,2.4vh,17px);color:rgba(255,255,255,.5)}
  .ls-count-wrap{display:flex;flex-direction:column;align-items:flex-end;flex-shrink:0}
  .ls-num{font-size:clamp(90px,40vh,210px);font-weight:200;line-height:.82;letter-spacing:-4px;font-variant-numeric:tabular-nums}
  .ls-goal{font-size:clamp(16px,3vh,22px);font-weight:600;color:rgba(255,255,255,.5);margin-top:2px}
  .ls-hint{font-size:clamp(11px,2vh,14px);color:rgba(255,255,255,.4);margin-top:10px}
  .ls-bar{position:absolute;left:0;bottom:0;height:5px;background:rgba(255,255,255,.85);width:0%;transition:width .35s cubic-bezier(.34,1.56,.64,1)}

  /* ACHIEVEMENT OVERLAY */
  .ach-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;align-items:center;justify-content:center;padding:20px}
  .ach-overlay.show{display:flex}
  .ach-card{background:#fff;border-radius:24px;padding:28px 24px 22px;text-align:center;max-width:320px;width:100%;position:relative;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.2)}
  .ach-lbl{font-size:11px;letter-spacing:.15em;color:#9ca3af;margin-bottom:4px}
  .ach-num{font-size:52px;font-weight:700;line-height:1;margin-bottom:3px}
  .ach-sub{font-size:16px;color:#111;font-weight:500;margin-bottom:20px}
  .ach-close{border:none;border-radius:12px;padding:13px 0;cursor:pointer;font-size:15px;font-weight:600;color:#fff;width:100%}
  .spark{position:absolute;width:6px;height:6px;border-radius:50%;animation:sfx 1s ease-out forwards;pointer-events:none}
  @keyframes sfx{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--sx),var(--sy)) scale(0);opacity:0}}

  /* KHECHARA SCENE */
  .kscene{width:100%;height:210px;border-radius:16px;overflow:hidden;background:linear-gradient(180deg,#04041a 0%,#1a0a60 50%,#7c3aed 85%,#ddd6fe 100%);position:relative;margin-bottom:14px}
  .kstars{position:absolute;inset:0}
  .kstar{position:absolute;border-radius:50%;background:#fff;animation:tw var(--d) ease-in-out infinite alternate}
  @keyframes tw{0%{opacity:.1}100%{opacity:1}}
  .kglow{position:absolute;left:50%;top:35%;transform:translate(-50%,-50%);width:140px;height:140px;border-radius:50%;background:radial-gradient(circle,rgba(196,181,253,.4) 0%,transparent 70%);animation:gp 3s ease-in-out infinite}
  @keyframes gp{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.4)}}
  .kcouple{position:absolute;left:50%;bottom:24px;transform:translateX(-50%);animation:asc 5s ease-in-out infinite}
  @keyframes asc{0%{transform:translateX(-50%) translateY(0);opacity:1}65%{transform:translateX(-50%) translateY(-50px);opacity:.7}82%{transform:translateX(-50%) translateY(-88px);opacity:0}83%,96%{transform:translateX(-50%) translateY(0);opacity:0}100%{opacity:1}}
  .kptcls{position:absolute;inset:0;pointer-events:none}
  .kp{position:absolute;border-radius:50%;animation:kr var(--d) ease-in var(--dl) infinite;opacity:0}
  @keyframes kr{0%{transform:translateY(0);opacity:.8}100%{transform:translateY(-170px);opacity:0}}
  .klbl{position:absolute;bottom:8px;left:0;right:0;text-align:center;color:#fff;font-size:20px;font-weight:700;text-shadow:0 0 20px #a78bfa;pointer-events:none}
  .ksub{font-size:11px;color:rgba(255,255,255,.6);margin-top:2px;font-weight:400}

  /* TABS */
  .tabs{display:flex;border-bottom:1px solid #e5e7eb;background:#fff;position:sticky;top:49px;z-index:19}
  .tab{flex:1;padding:10px;border:none;background:transparent;cursor:pointer;font-size:13px;font-weight:500;color:#6b7280;border-bottom:2px solid transparent;transition:all .15s}
  .tab.active{color:#c0185a;border-bottom-color:#c0185a}
  .tab-content{display:none}
  .tab-content.active{display:block}

  /* CALENDAR */
  .cal-wrap{padding:12px 16px 80px}
  .cal-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px}
  .cal-stat{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:10px 6px;text-align:center}
  .cal-stat-val{font-size:18px;font-weight:700;color:#111}
  .cal-stat-lbl{font-size:10px;color:#6b7280;margin-top:2px;line-height:1.2}
  #tabContentSleep .cal-stats{grid-template-columns:1fr}
  #tabContentSleep .cal-stat-val{font-size:22px}
  #tabContentSleep .cal-stat-lbl{font-size:11px}
  .cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .cal-nav-btn{border:1px solid #e5e7eb;background:#fff;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:15px;color:#6b7280}
  .cal-nav-btn:hover{background:#f3f4f6}
  .cal-month-lbl{font-size:15px;font-weight:600;color:#111}
  .cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px}
  .cal-wd{text-align:center;font-size:11px;color:#9ca3af;padding:3px 0}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
  .cal-cell{border-radius:10px;border:1px solid #e5e7eb;background:#fff;min-height:54px;padding:5px 4px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;transition:border-color .12s}
  .cal-cell:hover{border-color:#c0185a}
  .cal-cell.empty{background:transparent;border-color:transparent;cursor:default;pointer-events:none}
  .cal-cell.today{border-color:#c0185a;border-width:1.5px}
  .cal-dn{font-size:11px;color:#9ca3af}
  .cal-cell.today .cal-dn{color:#c0185a;font-weight:600}
  .cal-score{font-size:17px;font-weight:700;line-height:1}
  .cal-bar{width:100%;height:3px;border-radius:2px;background:#f3f4f6;overflow:hidden}
  .cal-bar-fill{height:100%;border-radius:2px;transition:width .3s}
  .cal-legend{display:flex;flex-wrap:wrap;gap:10px 16px;margin-top:12px;padding-top:10px;border-top:1px solid #e5e7eb}
  .leg{display:flex;align-items:center;gap:5px;font-size:12px;color:#6b7280}
  .leg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}

  /* TOAST */
  .toast{position:fixed;left:50%;top:16px;transform:translateX(-50%) translateY(-20px);background:#111;color:#fff;padding:10px 16px;border-radius:12px;font-size:13px;z-index:200;opacity:0;transition:.25s;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* EXPORT */
  .export-bar{padding:8px 16px;border-top:1px solid #e5e7eb;display:flex;gap:8px;background:#f9fafb}
  .export-btn{flex:1;padding:8px;border-radius:8px;border:1px solid #e5e7eb;background:#fff;cursor:pointer;font-size:12px;color:#6b7280}
  .export-btn:hover{background:#f3f4f6}
  .export-btn:disabled{opacity:.4;cursor:not-allowed}

  /* TIMER */
  .timer-wrap{padding:8px 16px 0;display:flex;justify-content:center}
  .timer-circle{width:140px;height:140px;position:relative;cursor:pointer;-webkit-tap-highlight-color:transparent}
  .timer-svg{width:140px;height:140px;transform:rotate(-90deg)}
  .timer-track{fill:none;stroke:#f3f4f6;stroke-width:9}
  .timer-prog{fill:none;stroke-width:9;stroke-linecap:round;transition:stroke-dashoffset .5s linear,stroke .5s}
  .timer-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px}
  .timer-time{font-size:32px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums}
  .timer-hint{font-size:11px;color:#9ca3af;margin-top:2px}
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js"></script>
</head>
<body>

<!-- SVG-спрайт алмаза (один <symbol> вместо инлайна ×192 в строках истории/слотов) -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <symbol id="gem" viewBox="0 0 20 20">
    <polygon points="10,2 18,7 10,18 2,7" fill="#f472b6" opacity=".3"/>
    <polygon points="10,2 18,7 10,11" fill="#fce7f3" opacity=".95"/>
    <polygon points="2,7 10,11 10,18" fill="#9b1040" opacity=".9"/>
    <polygon points="18,7 10,11 10,18" fill="#be1257" opacity=".9"/>
    <polygon points="10,2 18,7 10,7" fill="#fff" opacity=".98"/>
    <polygon points="10,2 2,7 10,7" fill="#fda4cf" opacity=".88"/>
    <polygon points="2,7 10,7 10,11" fill="#e91a6e" opacity=".65"/>
    <polygon points="18,7 10,7 10,11" fill="#c0185a" opacity=".65"/>
  </symbol>
</defs></svg>

<!-- TOPBAR -->
<div class="topbar">
  <span class="app-title">Ваджра-трекер<span class="app-ver">v2.6.2</span></span>
  <button id="undoBtn" class="undo-btn" style="display:none" title="Отменить последнее действие">↶ <span id="undoCnt"></span></button>
  <span class="offline-badge" id="offlineBadge" style="display:none" title="Нет сети — данные сохраняются локально и синхронизируются позже">⚡ оффлайн</span>
  <span class="date-badge" id="dateBadge"></span>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" id="tabTracker" onclick="switchTab('tracker')">Трекер</button>
  <button class="tab" id="tabCalendar" onclick="switchTab('calendar')">Календарь</button>
  <button class="tab" id="tabSleep" onclick="switchTab('sleep')">Сон</button>
</div>

<!-- TRACKER TAB -->
<div class="tab-content active" id="tabContentTracker">

<!-- AUTH -->
<div class="auth-bar" id="authBar">
  <input type="email" id="emailEl" placeholder="email">
  <input type="password" id="pwdEl" placeholder="пароль">
  <button class="btn-signin" id="btnSignIn">Войти</button>
  <button class="btn-signup" id="btnSignUp">Создать</button>
  <button class="btn-reset" id="btnReset">Забыли?</button>
  <button class="btn-logout" id="btnLogout" style="display:none">Выйти</button>
  <span class="auth-status" id="authStatus">не вошли</span>
</div>

<!-- DATE PICKER -->
<div style="padding:8px 16px;background:#f9fafb;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;gap:8px;justify-content:space-between">
  <button id="datePrev" style="border:1px solid #e5e7eb;background:#fff;border-radius:8px;padding:5px 12px;cursor:pointer;font-size:15px;color:#6b7280">‹</button>
  <span id="dateDisplay" style="font-size:13px;font-weight:500;color:#111;flex:1;text-align:center"></span>
  <button id="dateNext" style="border:1px solid #e5e7eb;background:#fff;border-radius:8px;padding:5px 12px;cursor:pointer;font-size:15px;color:#6b7280">›</button>
  <input type="date" id="datePicker" style="display:none">
</div>

<!-- SLEEP TILL NOW -->
<div class="sleep-bar" id="sleepBar">
  <button class="sleep-til-btn" id="sleepTilBtn">Сон до текущего времени</button>
</div>

<!-- HISTORY (toggle button — only for today) -->
<div id="histToggleWrap" style="padding:4px 16px 0">
  <button id="histToggleBtn" onclick="toggleHist()" style="width:100%;padding:7px;border:1px solid #e5e7eb;border-radius:10px;background:#fff;cursor:pointer;font-size:12px;color:#9ca3af;text-align:center">
    ↑ прошлые слоты
  </button>
</div>
<div class="hist-section" id="histSection">
  <div class="hist-rows" id="histRows"></div>
</div>

<!-- PREV SLOT -->
<div class="slots-wrap" id="prevSlotWrap"><div class="nb" id="prevSlot" style="display:none"></div></div>

<!-- MAIN BUTTON with integrated timer -->
<div class="main-btn-wrap" id="mainBtnWrap">
  <button class="main-btn" id="mainBtn" style="flex-direction:row;align-items:center;justify-content:space-between;padding:16px 20px;gap:12px">
    <!-- таймер слева -->
    <div style="position:relative;width:120px;height:120px;flex-shrink:0">
      <svg style="width:120px;height:120px;transform:rotate(-90deg)" viewBox="0 0 120 120">
        <circle fill="none" stroke="rgba(255,255,255,.15)" stroke-width="9" cx="60" cy="60" r="52"/>
        <circle id="timerProg" fill="none" stroke="rgba(255,255,255,.85)" stroke-width="9" stroke-linecap="round"

<script>
// ── FIREBASE CONFIG ────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyAYeb4qPZSHAdDqMxneVYtdFsy-hsuSbVs",
  authDomain: "vy-tracker.firebaseapp.com",
  projectId: "vy-tracker",
  storageBucket: "vy-tracker.firebasestorage.app",
  messagingSenderId: "140906721201",
  appId: "1:140906721201:web:c17603021a784fe5e01790"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();
firebase.firestore().enablePersistence().catch(()=>{});

// ── HELPERS ────────────────────────────────────────────────────────────
// локальная дата YYYY-MM-DD (НЕ UTC) — граница суток в полночь по местному времени.
// Раньше везде был new Date().toISOString().slice(0,10) (UTC), из-за чего около полуночи
// день «залипал» на вчера, а ночные записи уходили в предыдущий день.
function localDateStr(d = new Date()){
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
const slotTime = i => `${String(Math.floor(i/4)).padStart(2,'0')}:${String((i%4)*15).padStart(2,'0')}`;
const emptyDay = () => Array.from({length:96},(_,i)=>({time:slotTime(i),count:0,sleep:false,forgot:false,t:0}));
const dayRef   = (uid,d) => db.collection('users').doc(uid).collection('days').doc(d);
// Всегда ровно 96 слотов: emptyDay() как база, накладываем пришедшие по индексу.
// Защищает render() от краша на неполном/битом документе (`slots[ci]` undefined).
const normalizeSlots = arr => {
  const src = Array.isArray(arr) ? arr : [];
  return Array.from({length:96},(_,i)=>{
    const s = src[i] || {};
    // t = метка последней правки слота (клиентское Date.now()). 0 = не трогали / старые данные.
    return { time:slotTime(i), count:Number(s.count||0), sleep:Boolean(s.sleep), forgot:Boolean(s.forgot), t:Number(s.t)||0 };
  });
};

// Слияние ПО СЛОТАМ (last-writer-wins на уровне слота). Идемпотентно и коммутативно →
// сходится при любом порядке/гонках/оффлайне/нескольких контекстах и НЕ теряет правки
// ДРУГИХ слотов (в отличие от старого «весь день одним куском»).
//  - разные t → берём слот с более свежей правкой (поддерживает «минус» и снятие отметок);
//  - одинаковые t (не трогали с синка / миграция старых данных t=0) → объединяем без потерь
//    (max по очкам, OR по сон/забыл) — пустышка t=0 при этом не может затереть реальные данные.
function mergeSlots(a, b){
  const A = normalizeSlots(a), B = normalizeSlots(b);
  return Array.from({length:96},(_,i)=>{
    const x = A[i], y = B[i];
    if(x.t !== y.t) return x.t > y.t ? x : y;
    return { time:x.time, count:Math.max(x.count,y.count), sleep:x.sleep||y.sleep, forgot:x.forgot||y.forgot, t:x.t };
  });
}

// localStorage mirror — оффлайн-страховка от потери кликов.
// ts = время ПОСЛЕДНЕЙ записи данных в зеркало (для newest-wins при синке с сервером).
const LS_DAY = d => `vajra_day_${d}`;
function saveLocalDay(date, slots, ts){
  try{ localStorage.setItem(LS_DAY(date), JSON.stringify({slots, ts: (ts==null?Date.now():ts)})); }catch(e){}
}
function readLocalDay(date){
  try{
    const raw = localStorage.getItem(LS_DAY(date));
    return raw ? JSON.parse(raw) : null;
  }catch(e){ return null; }
}
// dayCache при перекате/смене дня берём из зеркала ЭТОГО дня (а не пустой плейсхолдер).
// Пустой плейсхолдер в модели newest-wins получал свежий ts и затирал реальные данные на сервере.
function dayCacheFromMirror(date){
  const m = readLocalDay(date);
  return (m && m.slots && m.slots.length) ? normalizeSlots(m.slots) : emptyDay();
}

// Чистка старых зеркал/ачивок (> 60 дней) — иначе localStorage растёт без предела
// и на iOS при переполнении начнёт тихо отказывать в записи (теряя клики).
(function pruneOldLocal(){
  try{
    const cutoff=new Date(); cutoff.setDate(cutoff.getDate()-60);
    const cutoffStr=localDateStr(cutoff);
    for(let i=localStorage.length-1;i>=0;i--){
      const k=localStorage.key(i);
      const m=k&&k.match(/^vajra_(?:day|ach)_(\d{4}-\d{2}-\d{2})$/);
      if(m && m[1]<cutoffStr) localStorage.removeItem(k);
    }
  }catch(e){}
})();

const GEM_SM = `<svg class="gem-icon" viewBox="0 0 20 20" width="13" height="13"><use href="#gem"/></svg>`;

const MILESTONES = [
  {n:25, lbl:'ДОСТИЖЕНИЕ', sub:'Начало',          color:'#1d6ef5', sparks:['#5aaeff','#93c5fd','#bfdbfe']},
  {n:50, lbl:'ПОЛПУТИ',    sub:'Полпути',          color:'#8b5cf6', sparks:['#a78bfa','#c4b5fd','#ddd6fe']},
  {n:75, lbl:'ПОЧТИ',      sub:'Почти',            color:'#f59e0b', sparks:['#fcd34d','#fde68a','#fef9c3']},
  {n:100,lbl:'КХЕЧАРА',   sub:'Небеса открыты',   color:'#7c3aed', sparks:['#fde68a','#ef4444','#a78bfa','#22c55e'], k:true},
];

// ── STATE ──────────────────────────────────────────────────────────────
let uid=null, unsubDay=null, dayCache=null;
let dayLoaded=false; // снимок текущего дня с сервера получен?
let daySeeded=false; // dayCache засеян реальными данными из зеркала (а не пустой плейсхолдер)?

// ачивки: один раз за день, только в момент достижения (не при загрузке)
function achKey(dateStr){ return `vajra_ach_${dateStr}`; }
function dayShown(dateStr){ try{ return new Set(JSON.parse(localStorage.getItem(achKey(dateStr))||'[]')); }catch(e){return new Set();} }
function markDayAch(dateStr,n){ try{ const s=dayShown(dateStr); s.add(n); localStorage.setItem(achKey(dateStr),JSON.stringify([...s])); }catch(e){} }
let prevTotal=0;
let isLoadingDay=false; // флаг: идёт загрузка данных, не триггерим ачивки

function curIdx(){
  const now=new Date();
  const dateStr=document.getElementById('datePicker').value;
  const todayStr=localDateStr(now);
  return dateStr===todayStr ? Math.floor((now.getHours()*60+now.getMinutes())/15) : 47;
}

function total(slots){ return (slots||dayCache||emptyDay()).reduce((a,s)=>a+Number(s.count||0),0); }

// ── AUTH ───────────────────────────────────────────────────────────────
document.getElementById('btnSignIn').onclick = async()=>{ try{ await auth.signInWithEmailAndPassword(document.getElementById('emailEl').value.trim(), document.getElementById('pwdEl').value); }catch(e){showToast(e.message);} };
document.getElementById('btnSignUp').onclick = async()=>{ try{ await auth.createUserWithEmailAndPassword(document.getElementById('emailEl').value.trim(), document.getElementById('pwdEl').value); showToast('Аккаунт создан!'); }catch(e){showToast(e.message);} };
document.getElementById('btnReset').onclick  = async()=>{ try{ await auth.sendPasswordResetEmail(document.getElementById('emailEl').value.trim()); showToast('Письмо отправлено'); }catch(e){showToast(e.message);} };
document.getElementById('btnLogout').onclick = async()=>{ if(unsubDay){unsubDay();unsubDay=null;} clearInterval(timerInterval); timerInterval=null; flushSave(); await auth.signOut(); };

auth.onAuthStateChanged(user=>{
  const loginEls=['emailEl','pwdEl','btnSignIn','btnSignUp','btnReset'];
  if(user){
    uid=user.uid;
    document.getElementById('authStatus').textContent=user.email||'в сети';
    loginEls.forEach(id=>document.getElementById(id).style.display='none');
    document.getElementById('btnLogout').style.display='';
    document.getElementById('exportDay').disabled=false;
    document.getElementById('exportAll').disabled=false;
    attachDayListener(document.getElementById('datePicker').value);
  } else {
    uid=null; dayCache=null;
    document.getElementById('authStatus').textContent='не вошли';
    loginEls.forEach(id=>document.getElementById(id).style.display='');
    document.getElementById('btnLogout').style.display='none';
    document.getElementById('exportDay').disabled=true;
    document.getElementById('exportAll').disabled=true;
    if(unsubDay){unsubDay();unsubDay=null;}
    render();
  }
});

// ── DATA ───────────────────────────────────────────────────────────────
function attachDayListener(dateStr){
  if(!uid) return;
  flushSave();              // дописать отложенную запись прежнего дня ДО сброса кеша
  if(unsubDay){unsubDay();unsubDay=null;}
  // При смене дня берём данные ИЗ ЗЕРКАЛА ЭТОГО дня (не пустой плейсхолдер и не данные прошлого дня).
  // Так касание до прихода снапшота правит реальные данные, а не пустоту, которая затёрла бы сервер.
  const mirror = readLocalDay(dateStr);
  const mirrorHas = !!(mirror && mirror.slots && mirror.slots.length);
  dayCache = mirrorHas ? normalizeSlots(mirror.slots) : emptyDay();
  daySeeded = mirrorHas;  // данные дня уже есть локально → правки пишем сразу, клик не теряется
  dayLoaded = false;      // снимок дня с сервера ещё не пришёл
  unsubDay = dayRef(uid,dateStr).onSnapshot(async snap=>{
    isLoadingDay=true;
    const serverSlots = snap.exists ? normalizeSlots(snap.data().slots||[]) : emptyDay();
    // Сливаем ПО СЛОТАМ: текущий dayCache (включает наши локальные правки/зеркало) ⊕ сервер.
    // Без потерь и идемпотентно — поэтому отдельная обработка hasPendingWrites не нужна
    // (своё же эхо слияние оставляет без изменений), и пустой плейсхолдер не может затереть сервер.
    const base   = dayCache || dayCacheFromMirror(dateStr);
    const merged = mergeSlots(base, serverSlots);
    dayCache = merged;
    saveLocalDay(dateStr, merged);
    // Если после слияния у нас есть слоты новее серверных — доносим наверх (на подтверждённом снимке).
    if(!snap.metadata.hasPendingWrites && JSON.stringify(merged) !== JSON.stringify(serverSlots)){
      try{ await dayRef(uid,dateStr).set({slots:merged, updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true}); }catch(e){}
    }
    prevTotal = dayCache.reduce((a,s)=>a+Number(s.count||0),0);
    render(true);
    isLoadingDay=false;
    dayLoaded=true;
  }, err=>console.error(err));
}

// Запись слотов: зеркало — мгновенно (не теряем клики), Firestore — через debounce 500мс
// (серия тапов коалесцируется в одну запись). Флаш — перед сменой дня / уходом в фон.
let saveTimer=null, pendingSaveDate=null;
function saveSlots(){
  const dateStr=document.getElementById('datePicker').value;
  // Гейт больше не нужен: послотовое слияние не теряет правки и не даёт пустышке затереть сервер,
  // поэтому пишем всегда — клик не теряется (раньше именно гейт «глотал» тапы на прошлых днях).
  saveLocalDay(dateStr, dayCache);          // зеркало мгновенно — оффлайн-страховка
  markMonthDirty(dateStr);                  // календарь/сон перечитают этот месяц
  if(!uid) return;
  pendingSaveDate=dateStr;
  clearTimeout(saveTimer);
  saveTimer=setTimeout(flushSave,500);
}
function flushSave(){
  clearTimeout(saveTimer); saveTimer=null;
  if(!uid || !pendingSaveDate) return;
  const dateStr=pendingSaveDate; pendingSaveDate=null;
  // Пишем послотовые данные (с метками t). onSnapshot на той стороне сольёт по слотам — без потерь.
  dayRef(uid,dateStr).set({slots:normalizeSlots(dayCache), updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true}).catch(e=>console.error(e));
}

// ── RENDER ─────────────────────────────────────────────────────────────
function render(autoScroll=false){
  const ci=curIdx();
  const slots=dayCache||emptyDay();
  const t=total(slots);
  const pct=Math.min(100,Math.round(t/100*100));

  const todayStr=localDateStr();
  const isPastDay=dp.value!==todayStr;

  // Живой UI (таймер с главной кнопкой, соседние слоты, Сон/Забыл, «Сон до...») — только для СЕГОДНЯ.
  // На прошлом дне «текущего слота» не существует (curIdx даёт заглушку 47=11:45), поэтому фейковый
  // активный таймер прячем. Прошлый день правится через полный список слотов ниже.
  ['sleepBar','prevSlotWrap','mainBtnWrap','botBtns','nextSlotWrap'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.style.display = isPastDay ? 'none' : '';
  });

  // для прошлого дня — скрываем кнопку и раскрываем все слоты
  const toggleWrap=document.getElementById('histToggleWrap');
  const histSection=document.getElementById('histSection');
  if(isPastDay){
    toggleWrap.style.display='none';
    histSection.classList.add('open');
    histSection.classList.add('all-open');
    histSection.style.maxHeight='none';
  } else {
    toggleWrap.style.display='';
    histSection.style.maxHeight='';
    histSection.classList.remove('all-open');
    if(!histOpen) histSection.classList.remove('open');
  }

  // header time
  document.getElementById('curTimeBadge2').textContent=slotTime(ci);
  document.getElementById('mainCnt').textContent=slots[ci].count;

  // footer progress
  document.getElementById('ftFill').style.width=pct+'%';
  document.getElementById('ftFill').style.background=pct>=100?'#f59e0b':pct>=67?'#22c55e':pct>=34?'#06b6d4':'#94a3b8';
  document.getElementById('ftLabel').textContent=`${t} / 100`;
  document.getElementById('ftPct').textContent=`${pct}%`;

  // landscape quick-tap
  document.getElementById('lsNum').textContent=t;

  document.getElementById('lsTimeBadge').textContent=slotTime(ci);

  // sleep / forgot buttons
  const sb=document.getElementById('sleepBtn');
  sb.textContent=slots[ci].sleep?'Сон ✓':'Сон';
  sb.className='bot-btn'+(slots[ci].sleep?' on':'');
  const fb=document.getElementById('forgotBtn');
  fb.textContent=slots[ci].forgot?'Забыл ✓':'Забыл';
  fb.className='bot-btn'+(slots[ci].forgot?' on-amber':'');

  // neighbor slots
  renderNb('prevSlot', ci-1, slots);
  renderNb('nextSlot', ci+1, slots);

  // history
  renderHist(ci, slots);

  // sleep summary
  renderSleepSummary();

  // milestones
  checkMilestone(t);

  // undo button
  updateUndoBtn();
}

let lastHistSig=null;
function renderHist(ci, slots){
  const todayStr=localDateStr();
  const isPastDay=dp.value!==todayStr;
  const visible=isPastDay||histOpen;          // скрытую историю не строим
  if(!visible){ lastHistSig=null; return; }    // сброс → при открытии гарантированно перерисуем
  const maxI=isPastDay?96:ci;                  // для прошлого дня — все 96 слотов

  // дешёвая сигнатура содержимого — тяжёлый innerHTML пересобираем только при изменении данных,
  // а не на каждый 30с-тик render() (главный тормоз на телефоне).
  let sig=dp.value+'|'+maxI;
  for(let i=0;i<maxI;i++){ const s=slots[i]; sig+='|'+s.count+(s.sleep?'S':'')+(s.forgot?'F':''); }
  if(sig===lastHistSig) return;
  lastHistSig=sig;

  const rows=document.getElementById('histRows');
  const prevScroll=rows.scrollTop;
  let h='';
  for(let i=0; i<maxI; i++){
    const s=slots[i];
    h+=`<div class="hist-row">
      <span class="hist-time">${slotTime(i)}</span>
      <span class="hist-cnt">${s.count||0}</span>
      <div class="hist-acts">
        <button class="gem-btn" data-act="plus" data-i="${i}">${GEM_SM}+</button>
        <button class="gem-btn minus" data-act="minus" data-i="${i}">${GEM_SM}−</button>
        <button class="btn-base${s.sleep?' on':''}" data-act="sleep" data-i="${i}">${s.sleep?'Сон ✓':'Сон'}</button>
        <button class="btn-base${s.forgot?' on-amber':''}" data-act="forgot" data-i="${i}">${s.forgot?'Забыл ✓':'Забыл'}</button>
      </div>
    </div>`;
  }
  rows.innerHTML=h;
  rows.scrollTop=prevScroll;
}

  for(const m of MILESTONES){

function exportCSV(obj,filename){

  for(const [date,slots] of Object.entries(obj)){
    (slots||[]).forEach(s=>rows.push([date,s.time,s.count,s.sleep?'Да':'Нет',s.forgot?'Да':'Нет']));

  const blob=new Blob([rows.map(r=>r.join(',')).join('\n')],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;a.click();
}

// ── СБРОС ДНЯ ──────────────────────────────────────────────────────────
// Полный обнул всех данных за выбранную дату — и в кеше, и в localStorage-зеркале, и в Firestore.
// Нужен, чтобы вычистить день, в который по ошибке затекли данные другого дня (merge max не давал
// уменьшить очки обычным минусом). Откатывается кнопкой ↶.
async function resetDay(){
  const dateStr=dp.value;
  if(!confirm(`Сбросить ВСЕ данные за ${dateStr}? Очки, сон и «забыл» за этот день обнулятся. Отменить можно кнопкой ↶.`)) return;
  pushUndo();
  clearTimeout(saveTimer); pendingSaveDate=null; // отменить отложенную запись, чтобы не перетёрла сброс
  // Все слоты помечаем свежим t — иначе послотовое слияние воскресит данные с сервера.
  const now=Date.now();
  dayCache=emptyDay().map(s=>({...s,t:now}));
  saveLocalDay(dateStr, dayCache); // зеркало → пусто
  markMonthDirty(dateStr);
  if(uid){
    try{ await dayRef(uid,dateStr).set({slots:normalizeSlots(dayCache), updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true}); }catch(e){console.error(e);}
  }
  const stb=document.getElementById('sleepTilBtn');
  if(stb){ stb.textContent='Сон до текущего времени'; stb.className='sleep-til-btn'; }
  render(); updateUndoBtn();
  showToast('День сброшен');
}

// ── CALENDAR ───────────────────────────────────────────────────────────
let calYear=new Date().getFullYear(), calMonth=new Date().getMonth();

// Кеш данных по месяцам (сырые слоты по дням) — общий для вкладок «Календарь» и «Сон».
// Грузим ТОЛЬКО показанный месяц (range-запрос по documentId), а не всю коллекцию —
// иначе блокирующий .get() всех дней висел на слабой сети до минуты.
const monthCache={};            // 'Y-M' -> { 'YYYY-MM-DD': slots(96) }
const monthDirty={};            // 'Y-M' -> true: в этом месяце писали день, перечитать
const monthKey=(y,m)=>`${y}-${m}`;
function markMonthDirty(dateStr){
  const p=String(dateStr).split('-'); const y=+p[0], mo=+p[1];
  if(y&&mo) monthDirty[monthKey(y,mo-1)]=true;
}
function monthBounds(y,m){
  const start=`${y}-${String(m+1).padStart(2,'0')}-01`;
  const ny=m===11?y+1:y, nm=m===11?0:m+1;
  const end=`${ny}-${String(nm+1).padStart(2,'0')}-01`; // эксклюзивная верхняя граница (учёт декабря)
  return {start,end};
}
function fetchMonth(y,m,source){
  const {start,end}=monthBounds(y,m);
  const q=db.collection('users').doc(uid).collection('days')
    .where(firebase.firestore.FieldPath.documentId(),'>=',start)
    .where(firebase.firestore.FieldPath.documentId(),'<',end);
  return q.get(source?{source}:undefined).then(snap=>{
    const days={}; snap.forEach(d=>{ days[d.id]=normalizeSlots(d.data().slots||[]); }); return days;
  });
}
// onUpdate(days) зовётся мгновенно из кеша (если есть), затем — со свежими данными сервера.
// Никаких блокирующих await в рендере: сетка рисуется сразу, очки/сон дозаливаются.
function loadMonth(y,m,onUpdate){
  if(!uid){ onUpdate({}); return; }
  const key=monthKey(y,m);
  if(monthCache[key]!==undefined && !monthDirty[key]){ onUpdate(monthCache[key]); return; }
  fetchMonth(y,m,'cache').then(d=>{ if(monthCache[key]===undefined){ monthCache[key]=d; onUpdate(d); } }).catch(()=>{});
  fetchMonth(y,m,'server').then(fresh=>{ monthCache[key]=fresh; monthDirty[key]=false; onUpdate(fresh); }).catch(()=>{});
}

function scoreColor(n){
  if(n>=100) return '#c0185a';
  if(n>=76)  return '#f59e0b';
  if(n>=51)  return '#22c55e';
  if(n>=26)  return '#06b6d4';
  return '#94a3b8';
}

const MONTH_NAMES=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];

function renderCalendar(){
  const y=calYear, m=calMonth;
  drawCalendar(y,m, monthCache[monthKey(y,m)]||{});                     // мгновенно: скелет + кеш
  loadMonth(y,m, days=>{ if(y===calYear&&m===calMonth) drawCalendar(y,m,days); });
}
function drawCalendar(y,m,daysRaw){
  document.getElementById('calMonthLbl').textContent=`${MONTH_NAMES[m]} ${y}`;
  const todayStr=localDateStr();
  const first=new Date(y,m,1);
  const last=new Date(y,m+1,0);
  let startDow=first.getDay(); if(startDow===0) startDow=7;

  const sums={};
  for(const ds in daysRaw) sums[ds]=daysRaw[ds].reduce((a,s)=>a+Number(s.count||0),0);

  let html='';
  for(let e=1;e<startDow;e++) html+='<div class="cal-cell empty"></div>';
  for(let d=1;d<=last.getDate();d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const score=sums[ds]||0;
    const color=scoreColor(score);
    const isToday=ds===todayStr;
    const pct=Math.min(100,Math.round(score/100*100));
    const fire=score>=100?' 🔥':'';
    html+=`<div class="cal-cell${isToday?' today':''}${score?' has-data':''}" onclick="calDayClick('${ds}')">
      <span class="cal-dn">${d}</span>
      ${score?`<span class="cal-score" style="color:${color}">${score}${fire}</span>
      <div class="cal-bar"><div class="cal-bar-fill" style="width:${pct}%;background:${color}"></div></div>`:''}
    </div>`;
  }
  document.getElementById('calGrid').innerHTML=html;

  // статы — daysRaw уже только показанный месяц
  const monthVals=Object.values(sums).filter(v=>v>0);
  const monthSum=monthVals.reduce((a,b)=>a+b,0);
  document.getElementById('calSum').textContent =monthSum||'—';
  document.getElementById('calBest').textContent=monthVals.length?Math.max(...monthVals):'—';
  document.getElementById('calDays').textContent=monthVals.length||'—';
  // среднее — только по завершённым дням: сегодня ещё идёт, неполный счёт тянул бы вниз
  const avgVals=Object.entries(sums).filter(([ds,v])=>v>0&&ds!==todayStr).map(([,v])=>v);
  document.getElementById('calAvg').textContent =avgVals.length?Math.round(avgVals.reduce((a,b)=>a+b,0)/avgVals.length):'—';
}

function calDayClick(ds){
  switchTab('tracker');
  document.getElementById('datePicker').value=ds;
  document.getElementById('datePicker').dispatchEvent(new Event('change'));
}
window.calDayClick=calDayClick;

document.getElementById('calPrev').addEventListener('click',()=>{
  calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCalendar();
});
document.getElementById('calNext').addEventListener('click',()=>{
  calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCalendar();
});

// ── SLEEP SUMMARY ──────────────────────────────────────────────────────
function calcSleepMinutes(slots){
  return (slots||[]).filter(s=>s.sleep).length * 15;
}

function fmtSleepTime(mins){
  if(!mins) return null;
  const h=Math.floor(mins/60);
  const m=mins%60;
  return `${h}:${String(m).padStart(2,'0')}`;
}

function renderSleepSummary(){
  const slots=dayCache||emptyDay();
  const mins=calcSleepMinutes(slots);
  const bar=document.getElementById('sleepSummaryText');
  if(!bar) return;
  if(mins>0){
    bar.textContent=`сон — ${fmtSleepTime(mins)}`;
    bar.parentElement.style.display='flex';
  } else {
    bar.parentElement.style.display='none';
  }
}

// ── SLEEP CALENDAR ─────────────────────────────────────────────────────
let sleepCalYear=new Date().getFullYear(), sleepCalMonth=new Date().getMonth();

function renderSleepCalendar(){
  const y=sleepCalYear, m=sleepCalMonth;
  drawSleepCalendar(y,m, monthCache[monthKey(y,m)]||{});
  loadMonth(y,m, days=>{ if(y===sleepCalYear&&m===sleepCalMonth) drawSleepCalendar(y,m,days); });
}
function drawSleepCalendar(y,m,daysRaw){
  document.getElementById('sleepCalMonthLbl').textContent=`${MONTH_NAMES[m]} ${y}`;
  const todayStr=localDateStr();
  const first=new Date(y,m,1);
  const last=new Date(y,m+1,0);
  let startDow=first.getDay(); if(startDow===0) startDow=7;

  const monthMins=[];
  let html='';
  for(let e=1;e<startDow;e++) html+='<div class="cal-cell empty"></div>';
  for(let d=1;d<=last.getDate();d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const slots=daysRaw[ds]||[];
    const mins=calcSleepMinutes(slots);
    const isToday=ds===todayStr;
    // сегодня в среднее не берём — записана только утренняя часть, вечерний сон добавится ночью
    if(mins>0&&!isToday) monthMins.push(mins);
    html+=`<div class="cal-cell${isToday?' today':''}${mins?' has-data':''}">
      <span class="cal-dn">${d}</span>
      ${mins?`<span class="cal-score" style="color:#6b7280;font-size:14px">${fmtSleepTime(mins)}</span>`:''}
    </div>`;
  }
  document.getElementById('sleepCalGrid').innerHTML=html;

  // среднее с округлением до 5 минут
  if(monthMins.length){
    const avg=Math.round(monthMins.reduce((a,b)=>a+b,0)/monthMins.length/5)*5;
    document.getElementById('sleepCalAvg').textContent=fmtSleepTime(avg);
  } else {
    document.getElementById('sleepCalAvg').textContent='—';
  }
}

document.getElementById('sleepCalPrev').addEventListener('click',()=>{
  sleepCalMonth--; if(sleepCalMonth<0){sleepCalMonth=11;sleepCalYear--;} renderSleepCalendar();
});
document.getElementById('sleepCalNext').addEventListener('click',()=>{
  sleepCalMonth++; if(sleepCalMonth>11){sleepCalMonth=0;sleepCalYear++;} renderSleepCalendar();
});

// ── UNDO STACK ─────────────────────────────────────────────────────────
const UNDO_MAX = 20;
let undoStack = [];
try{
  const saved = localStorage.getItem('vajra_undo');
  if(saved) undoStack = JSON.parse(saved) || [];
}catch(e){ undoStack = []; }

function pushUndo(){
  if(!dayCache) return;
  const dateStr = document.getElementById('datePicker').value;
  undoStack.push({
    slots: JSON.parse(JSON.stringify(dayCache)),
    date: dateStr,
    ts: Date.now()
  });
  if(undoStack.length > UNDO_MAX) undoStack.shift();
  try{ localStorage.setItem('vajra_undo', JSON.stringify(undoStack)); }catch(e){}
  updateUndoBtn();
}

function popUndo(){
  const curDate = document.getElementById('datePicker').value;
  for(let i = undoStack.length - 1; i >= 0; i--){
    if(undoStack[i].date === curDate){
      const snap = undoStack.splice(i, 1)[0];
      // Помечаем свежим t только изменённые откатом слоты — иначе слияние «не заметит» откат.
      const restored = normalizeSlots(snap.slots);
      const cur = normalizeSlots(dayCache||emptyDay());
      const now = Date.now();
      for(let k=0;k<96;k++){
        if(restored[k].count!==cur[k].count || restored[k].sleep!==cur[k].sleep || restored[k].forgot!==cur[k].forgot) restored[k].t=now;
      }
      dayCache = restored;
      try{ localStorage.setItem('vajra_undo', JSON.stringify(undoStack)); }catch(e){}
      render(); saveSlots();
      updateUndoBtn();
      showToast('Отменено');
      return;
    }
  }
  showToast('Нечего отменять');
}

function updateUndoBtn(){
  const btn = document.getElementById('undoBtn');
  const cnt = document.getElementById('undoCnt');
  if(!btn || !cnt) return;
  const curDate = document.getElementById('datePicker').value;
  const n = undoStack.filter(u => u.date === curDate).length;
  if(n > 0){
    btn.style.display = 'inline-flex';
    cnt.textContent = n;
  } else {
    btn.style.display = 'none';
  }
}

document.getElementById('undoBtn').addEventListener('click', popUndo);

// ── TIMER ──────────────────────────────────────────────────────────────
// Вместо счётчика секунд — сохраняем timestamp запуска.
// При возврате из фона вычисляем сколько реально прошло.
const TIMER_DURATION = 3 * 60;
const TIMER_MAX_OVERTIME = 12 * 60 * 60; // 12ч — дольше «+overtime» не считаем, замираем на +12:00
const CIRCUMFERENCE = 2 * Math.PI * 52;
let timerInterval = null;
let timerStartTs = null; // timestamp момента нажатия +1

function startTimer(){
  clearInterval(timerInterval);
  timerStartTs = Date.now();
  localStorage.setItem('vajra_timer_start', timerStartTs);
  timerInterval = setInterval(tickTimer, 500);
  tickTimer();
}

function tickTimer(){
  if(!timerStartTs) return;
  const elapsed = Math.floor((Date.now() - timerStartTs) / 1000);
  let timerSeconds = TIMER_DURATION - elapsed; // может уйти в минус (overtime = время сверх 3:00)
  if(-timerSeconds >= TIMER_MAX_OVERTIME){
    // прошло 12ч с последнего нажатия — замираем на +12:00 и больше не тикаем
    updateTimerUI(-TIMER_MAX_OVERTIME);
    clearInterval(timerInterval); timerInterval = null;
    return;
  }
  updateTimerUI(timerSeconds);
}

const TIMER_MAX_AGE = (TIMER_DURATION + TIMER_MAX_OVERTIME) * 1000; // ~12ч — пока счётчик ещё «живой»
// Восстановить таймер из localStorage, если он в пределах 12-часового окна (день не важен — счёт
// идёт и через полночь). Старше 12ч — не восстанавливаем, кружок возвращается на 3:00.
function restoreTimerFromStorage(){
  const raw = localStorage.getItem('vajra_timer_start');
  if(raw===null) return;
  const ts = parseInt(raw,10);
  const fresh = Number.isFinite(ts) && (Date.now()-ts <= TIMER_MAX_AGE);
  if(!fresh){
    localStorage.removeItem('vajra_timer_start');
    timerStartTs = null;
    clearInterval(timerInterval); timerInterval = null;
    updateTimerUI(TIMER_DURATION); // вернуть кружок на 3:00
    return;
  }
  timerStartTs = ts;
  clearInterval(timerInterval);
  timerInterval = setInterval(tickTimer, 500);
  tickTimer();
}

// при возврате из фона — катимся на сегодня (если picker отстал) и восстанавливаем таймер
document.addEventListener('visibilitychange', ()=>{
  if(document.visibilityState === 'visible'){
    ensureToday();
    render(); // пересчитываем текущий слот/дату — важно после смены часового пояса (посадка, выход из авиарежима)
    restoreTimerFromStorage();
  } else {
    flushSave(); // уход в фон/закрытие PWA — дописать отложенную запись немедленно
  }
});
window.addEventListener('pagehide', flushSave);

// восстанавливаем при загрузке страницы
restoreTimerFromStorage();

function formatTimer(secs){
  const abs = Math.abs(secs);
  const sign = secs < 0 ? '+' : '';
  const h = Math.floor(abs / 3600);
  const m = Math.floor((abs % 3600) / 60);
  const s = abs % 60;
  // от часа и больше — показываем Ч:ММ (секунды опускаем, иначе не влезает и мельтешит)
  if(h > 0) return `${sign}${h}:${String(m).padStart(2,'0')}`;
  return `${sign}${m}:${String(s).padStart(2,'0')}`;
}

function updateTimerUI(timerSeconds){
  const prog = document.getElementById('timerProg');
  const disp = document.getElementById('timerDisplay');
  const btn  = document.getElementById('mainBtn');
  if(!prog || !disp) return;

  // landscape-зеркало таймера
  const lsProg = document.getElementById('lsTimerProg');
  const lsDisp = document.getElementById('lsTimerDisplay');
  const lsBg   = document.getElementById('landscapeMode');

  let offset, stroke, bg;
  if(timerSeconds >= 0){
    // тёмно-мятная — таймер идёт, ещё не время
    const ratio = timerSeconds / TIMER_DURATION;
    offset = CIRCUMFERENCE * (1 - ratio);
    stroke = 'rgba(255,255,255,.85)';
    bg = '#0d4a3a';
  } else {
    // малиновая — пора вспоминать!
    const over = Math.min(Math.abs(timerSeconds) / TIMER_DURATION, 1);
    offset = CIRCUMFERENCE * (1 - over);
    stroke = 'rgba(255,255,255,.9)';
    bg = '#c0185a';
  }
  const txt = formatTimer(timerSeconds);

  prog.style.strokeDashoffset = offset;
  prog.setAttribute('stroke', stroke);
  disp.style.color = '#fff';
  disp.textContent = txt;
  btn.style.background = bg;

  if(lsProg){ lsProg.style.strokeDashoffset = offset; lsProg.setAttribute('stroke', stroke); }
  if(lsDisp){ lsDisp.textContent = txt; }
  if(lsBg){ lsBg.style.background = bg; }
}

render();

// ── АВТО-ПЕРЕКАТ ДНЯ + ЖИВОЙ ТЕКУЩИЙ СЛОТ ──────────────────────────────
// Тик каждые 30с: двигает подсветку текущего слота/таймер и катит дату в полночь.
let lastKnownToday = localDateStr();
setInterval(()=>{
  const t = localDateStr();
  if(t !== lastKnownToday){
    // катимся ТОЛЬКО вперёд (t > lastKnownToday): реальная полночь или сдвиг пояса вперёд.
    // Назад (часовой пояс ушёл назад, как при перелёте UTC+4 → UTC+2) — НЕ дёргаем пользователя.
    if(t > lastKnownToday && dp.value === lastKnownToday){
      dp.value = t;
      const stb = document.getElementById('sleepTilBtn');
      if(stb){ stb.textContent='Сон до текущего времени'; stb.className='sleep-til-btn'; }
      updateDateDisplay();
      if(typeof updateUndoBtn==='function') updateUndoBtn();
      if(uid) attachDayListener(t);
    }
    lastKnownToday = t;
  }
  render();
}, 30000);

  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('./sw.js').catch(e=>console.warn('SW register failed', e));
  });
}
